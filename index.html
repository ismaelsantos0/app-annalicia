
  <!DOCTYPE html>
  <html lang="pt-BR">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>Annalicia Admin</title>
      <meta name="description" content="Painel administrativo da loja Annalicia - Gerencie produtos, pedidos e marketing." />
      <meta name="robots" content="noindex, nofollow" />

      <!-- PWA Meta Tags -->
      <meta name="theme-color" content="#ec4899" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="Annalicia" />
      <link rel="apple-touch-icon" href="/icons/icon-192.png" />
      <link rel="manifest" href="/manifest.json" />

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>

      <!-- iOS-only gate: redirect non-Apple devices -->
      <script>
        (function() {
          var ua = navigator.userAgent || '';
          var isIOS = /iPhone|iPad|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
          if (!isIOS && !isStandalone) {
            window.location.replace('https://annalicia-modas.up.railway.app/admin');
          }
        })();
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>

      <!-- Service Worker Registration -->
      <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        }
      </script>
      
    </body>
  </html>
